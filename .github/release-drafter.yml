name-template: 'v$RESOLVED_VERSION 🐙'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🔧 Maintenance'
    labels:
      - 'chore'
      - 'maintenance'
      - 'refactor'
  - title: '⬆️ Dependencies'
    labels:
      - 'dependencies'
      - 'python'
      - 'docker'
      - 'ci'
  - title: '🧪 Testing'
    labels:
      - 'test'
      - 'testing'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '📱 Android'
    labels:
      - 'android'
  - title: '🏭 Production'
    labels:
      - 'production'
      - 'ops'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
      - 'docs'
      - 'dependencies'
  default: patch

template: |
  ## AIOS v$RESOLVED_VERSION

  $CHANGES

  ### 📊 Stats
  - Tests: 1010+
  - API routes: 143
  - Constitution: 67 articles

  ### 🔗 Links
  - [Documentation](https://jotalbot.github.io/AIOS/)
  - [Full Changelog](https://github.com/JoTalbot/AIOS/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION)

  ---
  *Automatically generated by Release Drafter*
