# Prometheus scrape config для AIOS ops-metrics.
#
#   docker run --rm --network host \
#     -v "$PWD/deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml" \
#     prom/prometheus:v2.53.0
#
# AIOS REST-агент должен слушать порт 8000 (make serve / uvicorn).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "aios-alerts.yml"

scrape_configs:
  - job_name: aios
    metrics_path: /metrics
    static_configs:
      - targets:
          - "127.0.0.1:8000"
        labels:
          service: aios-rest
