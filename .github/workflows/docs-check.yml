name: Docs Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-build:
    name: Build MkDocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material mkdocs-minify-plugin mike

      - name: Build documentation
        run: mkdocs build --strict 2>&1 | tee build.log

      - name: Check for warnings
        run: |
          if grep -q "WARNING" build.log; then
            echo "::warning::MkDocs build has warnings"
            grep "WARNING" build.log
            exit 1
          fi
          echo "✅ MkDocs build clean — no warnings"

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Documentation build has warnings!** Please check the MkDocs build logs. Run `mkdocs build` locally to see details.'
            })

  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          check-modified-files-only: 'yes'
          base-branch: 'main'
        continue-on-error: true
