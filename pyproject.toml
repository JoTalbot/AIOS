[build-system]
requires = ["setuptools>=83.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aios"
version = "9.4.0"
description = "Self-evolving Distributed Operating System - Production Exploitation GA"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "JoTalbot", email = "jo.talbot@gmail.com"}
]
dependencies = [
    "starlette>=0.27.0",
    "uvicorn>=0.20.0",
    "httpx>=0.28.1",
    "PyYAML>=5.4.0",
    "python-dateutil>=2.8.0",
    "websockets>=12.0",
    "grpcio>=1.60.0",
    "graphql-core>=3.2.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
dev = [
