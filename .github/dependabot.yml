# Dependabot configuration for AIOS
# Auto-create PRs for dependency updates

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Kiev"
    open-pull-requests-limit: 10
    reviewers:
      - "JoTalbot"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Kiev"
    open-pull-requests-limit: 5
    reviewers:
      - "JoTalbot"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Kiev"
    open-pull-requests-limit: 3
    reviewers:
      - "JoTalbot"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
