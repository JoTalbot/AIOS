groups:
  - name: aios-critical
    rules:
      - alert: AIOSDown
        expr: up{job="aios"} == 0
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "AIOS API is down"
          description: "{{ $labels.instance }} has been down for >2 minutes"

      - alert: HighErrorRate
        expr: rate(aios_errors_total[5m]) / rate(aios_requests_total[5m]) > 0.05
        for: 3m
        labels: {severity: warning}
        annotations:
          summary: "AIOS error rate >5%"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(aios_response_time_seconds_bucket[5m])) > 1.0
        for: 5m
        labels: {severity: warning}
        annotations:
          summary: "P95 latency >1s"
          description: "P95 latency is {{ $value }}s on {{ $labels.instance }}"

      - alert: OutboxBacklog
        expr: aios_outbox_pending > 100
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "Outbox backlog"
          description: "{{ $labels.platform }} has {{ $value }} pending outbox entries"

      - alert: NoCardsCollected
        expr: rate(aios_cards_collected[30m]) == 0
        for: 30m
        labels: {severity: warning}
        annotations:
          summary: "No cards collected in 30m"
          description: "{{ $labels.platform }} has not collected any cards in the last 30 minutes"

      - alert: AIOSShardWorkersDown
        expr: aios_shard_workers_active == 0
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "All shard workers down"
          description: "No active shard workers on {{ $labels.instance }}"

      - alert: AIOSQueueBacklog
        expr: aios_queue_depth > 50
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "Queue backlog growing"
          description: "{{ $labels.platform }} queue depth {{ $value }}"

      - alert: AIOSStaleClaims
        expr: aios_shard_stale_claims > 3
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: "Stale shard claims"
          description: "{{ $value }} stale claims on {{ $labels.instance }}"

      - alert: AIOSFleetExhausted
        expr: aios_free_devices == 0
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "Device fleet exhausted"
          description: "No free devices in fleet on {{ $labels.instance }}"

      - alert: AIOSOutboxApprovalLag
        expr: aios_outbox_pending_approval > 10
        for: 30m
        labels: {severity: warning}
        annotations:
          summary: "Outbox approval lag"
          description: "{{ $value }} outbox items awaiting approval"
