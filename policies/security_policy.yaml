version: "2.1.1"

security_policy:
  requirements:
    access_control: true
    node_verification: true
    audit_logging: true
    critical_component_protection: true

  rules:
    least_privilege: true
    unknown_access_blocked: true
    security_events_tracked: true

  threat_levels:
    critical:
      action: immediate_isolation
      escalation: human_review
    high:
      action: restricted_operation
      escalation: audit_and_review
    medium:
      action: monitored_operation
      escalation: logging
    low:
      action: standard_operation
      escalation: background_monitoring
