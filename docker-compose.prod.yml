services:
  aios-api:
    build: .
    container_name: aios-api-prod
    ports:
      - "8000:8000"
    environment:
      - AIOS_API_KEYS=${AIOS_API_KEYS:-{"prod-key":{"subject":"prod","roles":["admin"]}}}
      - AIOS_PROFILES_DB=/app/data/profiles.sqlite
      - AIOS_DEVICES_DB=/app/data/devices.sqlite
      - AIOS_SHARDS_DB=/app/data/shards.sqlite
      - AIOS_OLX_DB=/app/data/olx.sqlite
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - aios-net

  aios-mcp:
    build: .
    container_name: aios-mcp-prod
    command: ["python", "run_mcp_server.py", "--host", "0.0.0.0", "--port", "8471", "--db", "/app/data/aios.sqlite"]
    ports:
      - "8471:8471"
    environment:
      - AIOS_API_KEYS=${AIOS_API_KEYS:-{"prod-key":{"subject":"prod","roles":["admin"]}}}
      - AIOS_PROFILES_DB=/app/data/profiles.sqlite
      - AIOS_DEVICES_DB=/app/data/devices.sqlite
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      aios-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aios-net

  aios-dashboard:
    build: .
    container_name: aios-dashboard-prod
    command: ["python", "run_dashboard.py"]
    ports:
      - "8080:8080"
    environment:
      - AIOS_API_KEYS=${AIOS_API_KEYS:-{"prod-key":{"subject":"prod","roles":["admin"]}}}
      - AIOS_PROFILES_DB=/app/data/profiles.sqlite
    volumes:
      - ./data:/app/data
    depends_on:
      aios-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aios-net

  aios-autopilot:
    build: .
    container_name: aios-autopilot-prod
    command: ["python", "run_production_autopilot.py", "--daemon", "--interval", "900", "--config", "default_3_ig"]
    environment:
      - AIOS_API_KEYS=${AIOS_API_KEYS:-{"prod-key":{"subject":"prod","roles":["admin"]}}}
      - AIOS_PROFILES_DB=/app/data/profiles.sqlite
      - AIOS_DEVICES_DB=/app/data/devices.sqlite
      - AIOS_WEBHOOK_URL=${AIOS_WEBHOOK_URL:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      aios-api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - aios-net

  prometheus:
    image: prom/prometheus:latest
    container_name: aios-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deploy/monitoring/production-alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - aios-net

  grafana:
    image: grafana/grafana:latest
    container_name: aios-grafana-prod
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/monitoring/grafana-production.json:/var/lib/grafana/dashboards/aios-production.json
      - ./deploy/monitoring/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/aios.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - aios-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  aios-net:
    driver: bridge
