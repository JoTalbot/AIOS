# AIOS CRDs: Platform / Profile / Job (v1alpha1)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: platforms.aios.io
spec:
  group: aios.io
  scope: Namespaced
  names:
    kind: Platform
    plural: platforms
    singular: platform
    shortNames: [aipf]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [name, androidPackage]
              properties:
                name:
                  type: string
                  description: Имя платформы (platforms/<name>.yaml)
                androidPackage:
                  type: string
                storageClass:
                  type: string
                  description: Питон-путь класса хранилища
                locale:
                  type: string
                  default: uk-UA
                compliance:
                  type: object
                  properties:
                    autopost_allowed: {type: boolean, default: false}
                    messenger:
                      type: string
                      enum: [approval-only, open, none]
                      default: approval-only
                    collector: {type: boolean, default: false}
            status:
              type: object
              properties:
                phase: {type: string, enum: [Pending, Ready, Failed]}
                calibratedHints:
                  type: array
                  items: {type: string}
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: profiles.aios.io
spec:
  group: aios.io
  scope: Namespaced
  names:
    kind: Profile
    plural: profiles
    singular: profile
    shortNames: [aipr]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [platformRef, name]
              properties:
                platformRef: {type: string}
                name: {type: string}
                deviceSerial: {type: string}
                default: {type: boolean, default: false}
            status:
              type: object
              properties:
                leasedDevice: {type: string}
                phase: {type: string, enum: [Waiting, Active, Error]}
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: jobs.aios.io
spec:
  group: aios.io
  scope: Namespaced
  names:
    kind: Job
    plural: jobs
    singular: job
    shortNames: [aijb]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [profileKey, kind]
              properties:
                profileKey: {type: string, description: "platform:profile"}
                kind:
                  type: string
                  description: autopilot | reels | dm-flush | marker-check
                payload:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Claimed, Done, Failed]
                claimedBy: {type: string}
                result: {type: string}
      subresources:
        status: {}
