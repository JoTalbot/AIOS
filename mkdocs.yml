site_name: AIOS — Autonomous Intelligence Operating System
site_description: >
  Self-evolving distributed operating system for application intelligence,
  automated testing, API generation, skill evolution and collective learning.
  Powered by the Octopus Runtime.
site_url: https://jotalbot.github.io/AIOS/
repo_url: https://github.com/JoTalbot/AIOS
repo_name: JoTalbot/AIOS
edit_uri: edit/main/docs/

theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Переключить на светлую тему
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Переключить на тёмную тему
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes

plugins:
  - search:
      lang:
        - ru
        - en
  - minify:
      minify_html: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JoTalbot/AIOS
  analytics:
    provider: google
    property: G-XXXXXXXXXX

