name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Run core tests
        run: python -m pytest tests/ -q --ignore=tests/test_android_rpa_bridge.py -k "not real_device" --timeout=30 -x
      - run: python -m compileall -q aios_core

  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip pre-commit
      - run: pre-commit run --all-files || true
      - name: Check for bare excepts
        run: |
          BARES=$(grep -rn 'except:' aios_core/ --include='*.py' | grep -v 'Exception\|noqa' | wc -l)
          [ "$BARES" -eq 0 ] || { echo "❌ $BARES bare excepts found"; exit 1; }

  package:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build

  perf-profile:
    name: Performance profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Quick performance smoke test
        run: python -c "
import time, importlib
t0 = time.perf_counter()
import aios_core
t1 = time.perf_counter()
import aios_core.storage
t2 = time.perf_counter()
print(f'Core import: {(t1-t0)*1000:.0f}ms')
print(f'Storage import: {(t2-t1)*1000:.0f}ms')
assert (t2-t0) < 5.0, 'Import too slow'
"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip pip-audit
      - run: python -m pip install -r requirements.txt
      - run: pip-audit --disable-pip || true
