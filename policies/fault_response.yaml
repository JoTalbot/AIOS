version: "2.1.1"

fault_response:
  fault_types:
    - node_failure
    - policy_violation
    - version_conflict
    - synchronization_loss

  responses:
    node_failure:
      action: isolate_and_recover

    policy_violation:
      action: audit_and_restrict

    version_conflict:
      action: rollback_or_review

    synchronization_loss:
      action: resync_and_validate

  escalation:
    critical_fault: human_review
