apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aios-api-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: aios
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    # Allow DB egress
    ports:
    - protocol: TCP
      port: 5432
  - to:
    # Allow Redis egress
    ports:
    - protocol: TCP
      port: 6379
