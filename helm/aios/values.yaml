replicaCount: 2

image:
  repository: aios
  pullPolicy: IfNotPresent
  tag: "4.1.0-alpha"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  - name: AIOS_API_KEYS
    value: '{"k8s":{"subject":"admin","roles":["admin"]}}'

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70