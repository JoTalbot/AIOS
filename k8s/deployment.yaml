apiVersion: apps/v1
kind: Deployment
metadata:
  name: aios-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aios
  template:
    metadata:
      labels:
        app: aios
    spec:
      containers:
      - name: aios
        image: aios:latest
        ports:
        - containerPort: 8000
        env:
        - name: AIOS_API_KEYS
          value: '{"k8s":{"subject":"admin","roles":["admin"]}}'
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: aios-service
spec:
  selector:
    app: aios
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP