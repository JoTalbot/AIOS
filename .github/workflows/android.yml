name: Android CI

on:
  push:
    paths:
      - 'aios_core/android_*'
      - 'tests/test_android_*'
      - 'android-bootstrap.sh'
      - 'android-emulator-run.sh'
      - 'setup/android-emulator-env.sh'
      - 'Dockerfile.android'
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    env:
      AIOS_EMULATOR_HEADLESS: "1"
      AIOS_DEVICE_ID: emulator-5554
      AIOS_AVD_NAME: AIOS_Slando
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio httpx graphql-core websockets grpcio
      - name: Start headless emulator
        run: |
          bash android-bootstrap.sh
