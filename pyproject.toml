[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aios"
version = "9.0.0-alpha.21"
description = "Self-evolving Distributed Operating System"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "JoTalbot", email = "jo.talbot@gmail.com"}
]
dependencies = [
    "starlette>=0.27.0",
    "uvicorn>=0.20.0",
    "httpx>=0.24.0",
    "PyYAML>=5.4.0",
    "python-dateutil>=2.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=22.0.0",
]

[project.scripts]
aios = "aios_cli:main"

[tool.setuptools.packages.find]
where = ["."]